# https://taskfile.dev/usage/
version: "3"
tasks:
  default: task test
  dev: bun run dev
  test: |
    bun test ./test/*.test.ts
    bun test ./test/**/*.test.ts

  ## Env
  # https://bun.sh/docs/runtime/env#setting-environment-variables
  # BUN_CONFIG_MAX_HTTP_REQUESTS=256 bun xxx
  env-hi: bun -p Bun.env.HELLO
